name: Build DigifantTool

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pywebview pyinstaller
      - name: Build EXE
        run: |
          python -m PyInstaller --onefile --windowed --name DigifantTool --distpath dist --add-data "app/DigifantTool.html;app" --hidden-import "webview.platforms.winforms" --hidden-import "pythonnet" desktop/main.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DigifantTool-Windows
          path: dist/DigifantTool.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system deps
        run: sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0 gir1.2-webkit2-4.0 libgtk-3-dev libwebkit2gtk-4.0-dev
      - name: Install dependencies
        run: pip install pywebview pyinstaller
      - name: Build binary
        run: |
          python -m PyInstaller --onefile --name DigifantTool --distpath dist --add-data "app/DigifantTool.html:app" --hidden-import "webview.platforms.gtk" desktop/main.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DigifantTool-Linux
          path: dist/DigifantTool

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DigifantTool-Windows/DigifantTool.exe
            DigifantTool-Linux/DigifantTool
