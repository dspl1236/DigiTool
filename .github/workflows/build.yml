name: Build DigiTool Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      exe_name: ${{ steps.get_version.outputs.exe_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 pyinstaller

      - name: Get version
        id: get_version
        shell: python
        run: |
          import os, re
          text = open("digitool/version.py").read()
          ver  = re.search(r'APP_VERSION\s*=\s*["\']([^"\']+)["\']', text).group(1)
          exe  = f"DigiTool-v{ver}"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={ver}\n")
              f.write(f"exe_name={exe}\n")

      - name: Build EXE
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name DigiTool-v${{ steps.get_version.outputs.version }} `
            --hidden-import PyQt5.QtCore `
            --hidden-import PyQt5.QtGui `
            --hidden-import PyQt5.QtWidgets `
            digitool/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DigiTool-Windows
          path: dist/DigiTool-v${{ steps.get_version.outputs.version }}.exe

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: DigiTool-Windows
          path: dist/

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --title "DigiTool v${{ needs.build-windows.outputs.version }} — Latest Build" \
            --notes "## DigiTool v${{ needs.build-windows.outputs.version }}

          **Digifant 1 G60 / G40 ECU Editor — Python / PyQt5 desktop app**

          Download \`DigiTool-v${{ needs.build-windows.outputs.version }}.exe\` and run — no install needed.

          ### Supported ECUs
          - G60 Corrado / Golf / Jetta / Passat Syncro / 16v Limited
          - G60 Triple-Map (Corrado SLS)
          - G40 Polo Mk3
          - G40 Polo Mk2 (early)

          ### Features
          - ROM variant detection (CRC32 + reset vector fingerprinting)
          - Ignition and Fuel 16x16 heatmap editors
          - Correction tables (warmup, ECT, IAT, boost cut, etc.)
          - Code patch flags (Digilag, Open Loop Lambda, ISV disable)
          - Full hex view with region labels
          - ROM diff / compare tool
          - Save edited ROM back to .BIN

          *VW Digifant 1 — G60/G40 ECU Editor*" \
            --prerelease \
            "dist/DigiTool-v${{ needs.build-windows.outputs.version }}.exe"
